<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>NEC Results Portal</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
background:linear-gradient(135deg,#4facfe,#00f2fe);
min-height:100vh;
display:flex;
flex-direction:column;
align-items:center;
animation:fadeIn 1s ease;
}

@keyframes fadeIn{
from{opacity:0;}
to{opacity:1;}
}

header{
background:#6a0dad;
color:white;
width:100%;
text-align:center;
padding:15px;
box-shadow:0 4px 10px rgba(0,0,0,0.3);
}

header h1{
font-size:24px;
}

.container{
background:white;
margin-top:40px;
padding:30px;
border-radius:15px;
box-shadow:0 10px 30px rgba(0,0,0,0.2);
width:90%;
max-width:700px;
text-align:center;
animation:slideUp 1s ease;
}

@keyframes slideUp{
from{
transform:translateY(50px);
opacity:0;
}
to{
transform:translateY(0);
opacity:1;
}
}

#logo{
width:120px;
margin-bottom:15px;
}

h2{
color:#007BFF;
margin-bottom:20px;
}

input{
padding:12px;
width:70%;
border-radius:6px;
border:1px solid #ccc;
margin-bottom:15px;
font-size:16px;
}

button{
padding:12px 20px;
border:none;
background:#007BFF;
color:white;
font-size:16px;
border-radius:6px;
cursor:pointer;
transition:0.3s;
}

button:hover{
background:#0056b3;
transform:scale(1.05);
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
animation:fadeIn 1s ease;
}

th,td{
border:1px solid #ddd;
padding:10px;
text-align:center;
}

th{
background:#007BFF;
color:white;
}

tr:nth-child(even){
background:#f2f2f2;
}

.pass{
color:green;
font-weight:bold;
}

.fail{
color:red;
font-weight:bold;
}

.sgpa{
margin-top:20px;
font-size:18px;
font-weight:bold;
color:#333;
}

</style>

</head>

<body>

<header>
<h1>NARASARAOPETA ENGINEERING COLLEGE (Autonomous)</h1>
<p>Kotappakonda Rd, Narasaraopeta, Andhra Pradesh</p>
</header>

<div class="container">

<img src="nec.png" id="logo">

<h2>IT Department Results (2-1 Semester)</h2>

<label>Enter HT Number</label><br>

<input type="text" id="rollNumber" placeholder="Example: 22471A1201">

<br>

<button onclick="displayResults()">View Results</button>

<div id="result"></div>

</div>

<script>

function isValidHallTicket(ht){

ht = ht.toUpperCase();

const pattern = /^(22471A12\d{2}|23475A12\d{2})$/;

if(!pattern.test(ht)){
return false;
}

const number = parseInt(ht.slice(-2));

if(ht.startsWith("22471A12")){
return number>=1 && number<=66;
}

if(ht.startsWith("23475A12")){
return number>=1 && number<=6;
}

return false;
}

function generatePoint(){
return Math.floor(Math.random()*6)+5;
}

function displayResults(){

let ht = document.getElementById("rollNumber").value.toUpperCase();

if(!isValidHallTicket(ht)){

alert("Invalid Hall Ticket Number\n\nValid Range:\n22471A1201 - 22471A1266\n23475A1201 - 23475A1206");

return;

}

const subjects=[
{ name:"COI",credits:3 },
{ name:"JAVA",credits:3 },
{ name:"DATA STRUCTURES",credits:3 },
{ name:"FEWT",credits:3 },
{ name:"CO",credits:3 },
{ name:"MFCS",credits:3 },
{ name:"DS LAB",credits:2 },
{ name:"DSA LAB",credits:2 },
{ name:"JAVA LAB",credits:2 },
{ name:"FEWT LAB",credits:2 }
];

let totalCredits=0;
let totalPoints=0;

let html=`<h3>Results for HT: ${ht}</h3>`;

html+=`
<table>
<tr>
<th>S.No</th>
<th>Subject</th>
<th>Points</th>
<th>Credits</th>
</tr>
`;

subjects.forEach((sub,i)=>{

let p=generatePoint();

totalCredits+=sub.credits;
totalPoints+=p*sub.credits;

html+=`
<tr>
<td>${i+1}</td>
<td>${sub.name}</td>
<td>${p}</td>
<td>${sub.credits}</td>
</tr>
`;

});

html+=`</table>`;

let sgpa=(totalPoints/totalCredits).toFixed(2);

let status= sgpa>=5 ? "PASS" : "FAIL";

html+=`
<div class="sgpa">
SGPA : ${sgpa} <br>
Status : <span class="${status==="PASS"?"pass":"fail"}">${status}</span>
</div>
`;

document.getElementById("result").innerHTML=html;

}

</script>

</body>
</html>
