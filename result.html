<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEC Results Portal</title>

<style>

body{
font-family:Arial;
margin:0;
background:linear-gradient(135deg,#4facfe,#00f2fe);
}

header{
background:darkviolet;
color:white;
text-align:center;
padding:15px;
}

.container{
width:80%;
max-width:700px;
margin:40px auto;
background:white;
padding:25px;
border-radius:10px;
box-shadow:0 0 20px rgba(0,0,0,0.3);
text-align:center;
}

h2{
color:#007BFF;
}

input{
padding:10px;
width:70%;
border-radius:5px;
border:1px solid #ccc;
}

button{
padding:10px 20px;
background:#007BFF;
color:white;
border:none;
border-radius:5px;
cursor:pointer;
margin-top:10px;
}

button:hover{
background:#0056b3;
}

table{
width:100%;
border-collapse:collapse;
margin-top:20px;
}

th,td{
border:1px solid #ccc;
padding:8px;
text-align:center;
}

th{
background:#007BFF;
color:white;
}

.pass{
color:green;
font-weight:bold;
}

.fail{
color:red;
font-weight:bold;
}

</style>
</head>

<body>

<header>
<h1>NARASARAOPETA ENGINEERING COLLEGE (Autonomous)</h1>
<p>Kotappakonda Rd, Narasaraopeta</p>
</header>

<div class="container">

<h2>IT Results (2-1 Semester)</h2>

<input type="text" id="rollNumber" placeholder="Enter Hall Ticket Number">

<br><br>

<button onclick="displayResults()">View Results</button>

<div id="result"></div>

</div>

<script>

function isValidHallTicket(ht){

ht = ht.toUpperCase().trim();

const match = ht.match(/^(\d{5}A12)(\d{2})$/);

if(!match) return false;

const prefix = match[1];
const number = parseInt(match[2]);

if(prefix==="22471A12"){
return number>=1 && number<=66;
}

if(prefix==="23475A12"){
return number>=1 && number<=6;
}

return false;

}

function generatePoint(){
return Math.floor(Math.random()*6)+5;
}

function displayResults(){

let ht = document.getElementById("rollNumber").value;

ht = ht.toUpperCase();

if(!isValidHallTicket(ht)){

alert("Invalid Hall Ticket Number\n\nValid Range:\n22471A1201 - 22471A1266\n23475A1201 - 23475A1206");

return;

}

const subjects=[
{ name:"COI",credits:3 },
{ name:"JAVA",credits:3 },
{ name:"DATA STRUCTURES",credits:3 },
{ name:"FEWT",credits:3 },
{ name:"CO",credits:3 },
{ name:"MFCS",credits:3 },
{ name:"DS LAB",credits:2 },
{ name:"DSA LAB",credits:2 },
{ name:"JAVA LAB",credits:2 },
{ name:"FEWT LAB",credits:2 }
];

let totalCredits=0;
let totalPoints=0;

let html=`<h3>Results for HT: ${ht}</h3>`;

html+=`
<table>
<tr>
<th>S.No</th>
<th>Subject</th>
<th>Points</th>
<th>Credits</th>
</tr>
`;

subjects.forEach((sub,i)=>{

let p=generatePoint();

totalCredits+=sub.credits;
totalPoints+=p*sub.credits;

html+=`
<tr>
<td>${i+1}</td>
<td>${sub.name}</td>
<td>${p}</td>
<td>${sub.credits}</td>
</tr>
`;

});

html+=`</table>`;

let sgpa=(totalPoints/totalCredits).toFixed(2);

let status= sgpa>=5 ? "PASS" : "FAIL";

html+=`
<h3>SGPA : ${sgpa}</h3>
<h3 class="${status==="PASS"?"pass":"fail"}">${status}</h3>
`;

document.getElementById("result").innerHTML=html;

}

</script>

</body>
</html>
