<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NEC Results Portal</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Segoe UI',sans-serif;
}

body{
height:100vh;
background:linear-gradient(-45deg,#6a11cb,#2575fc,#00c6ff,#7f00ff);
background-size:400% 400%;
animation:bgAnimation 12s infinite ease;
display:flex;
flex-direction:column;
align-items:center;
color:white;
}

@keyframes bgAnimation{
0%{background-position:0% 50%;}
50%{background-position:100% 50%;}
100%{background-position:0% 50%;}
}

header{
width:100%;
text-align:center;
padding:20px;
background:rgba(0,0,0,0.4);
backdrop-filter:blur(6px);
}

header h1{
font-size:26px;
}

.container{

margin-top:40px;
width:90%;
max-width:700px;
padding:35px;

background:rgba(255,255,255,0.15);
border-radius:15px;
backdrop-filter:blur(15px);
box-shadow:0 8px 40px rgba(0,0,0,0.4);

text-align:center;
animation:fadeIn 1s ease;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(40px);
}
to{
opacity:1;
transform:translateY(0);
}
}

h2{
margin-bottom:20px;
}

input{
width:70%;
padding:12px;
border:none;
border-radius:6px;
outline:none;
font-size:16px;
margin-top:10px;
}

button{

margin-top:15px;
padding:12px 25px;

border:none;
border-radius:30px;

background:linear-gradient(45deg,#00f2fe,#4facfe);

color:white;
font-size:16px;
cursor:pointer;

transition:0.3s;
box-shadow:0 0 15px rgba(0,0,0,0.4);

}

button:hover{

transform:scale(1.08);
box-shadow:0 0 25px #00f2fe;

}

table{

width:100%;
margin-top:20px;
border-collapse:collapse;

background:white;
color:black;

border-radius:10px;
overflow:hidden;

animation:fadeIn 1s ease;

}

th{
background:#2575fc;
color:white;
padding:10px;
}

td{
padding:10px;
border-bottom:1px solid #ddd;
}

tr:hover{
background:#f2f2f2;
}

.pass{
color:green;
font-weight:bold;
}

.fail{
color:red;
font-weight:bold;
}

.sgpaBox{

margin-top:20px;
padding:15px;
background:white;
color:black;
border-radius:10px;
font-weight:bold;
}

</style>
</head>

<body>

<header>
<h1>NARASARAOPETA ENGINEERING COLLEGE (Autonomous)</h1>
<p>Kotappakonda Rd, Narasaraopeta</p>
</header>

<div class="container">

<h2>IT Department Results (2-1 Semester)</h2>

<input type="text" id="rollNumber" placeholder="Enter Hall Ticket Number">

<br>

<button onclick="displayResults()">View Results</button>

<div id="result"></div>

</div>

<script>

function isValidHallTicket(ht){

ht=ht.toUpperCase().trim();

const match=ht.match(/^(\d{5}A12)(\d{2})$/);

if(!match) return false;

const prefix=match[1];
const number=parseInt(match[2]);

if(prefix==="22471A12"){
return number>=1 && number<=66;
}

if(prefix==="23475A12"){
return number>=1 && number<=6;
}

return false;

}

function generatePoint(){
return Math.floor(Math.random()*6)+5;
}

function displayResults(){

let ht=document.getElementById("rollNumber").value.toUpperCase();

if(!isValidHallTicket(ht)){

alert("Invalid Hall Ticket Number\n\nValid Range:\n22471A1201 - 22471A1266\n23475A1201 - 23475A1206");

return;

}

const subjects=[
{ name:"COI",credits:3 },
{ name:"JAVA",credits:3 },
{ name:"DATA STRUCTURES",credits:3 },
{ name:"FEWT",credits:3 },
{ name:"CO",credits:3 },
{ name:"MFCS",credits:3 },
{ name:"DS LAB",credits:2 },
{ name:"DSA LAB",credits:2 },
{ name:"JAVA LAB",credits:2 },
{ name:"FEWT LAB",credits:2 }
];

let totalCredits=0;
let totalPoints=0;

let html=`<h3>Results for HT: ${ht}</h3>`;

html+=`
<table>
<tr>
<th>S.No</th>
<th>Subject</th>
<th>Points</th>
<th>Credits</th>
</tr>
`;

subjects.forEach((sub,i)=>{

let p=generatePoint();

totalCredits+=sub.credits;
totalPoints+=p*sub.credits;

html+=`
<tr>
<td>${i+1}</td>
<td>${sub.name}</td>
<td>${p}</td>
<td>${sub.credits}</td>
</tr>
`;

});

html+=`</table>`;

let sgpa=(totalPoints/totalCredits).toFixed(2);

let status=sgpa>=5?"PASS":"FAIL";

html+=`
<div class="sgpaBox">
SGPA : ${sgpa} <br>
Status : <span class="${status==="PASS"?"pass":"fail"}">${status}</span>
</div>
`;

document.getElementById("result").innerHTML=html;

}

</script>

</body>
</html>
