<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Results Portal</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family: 'Segoe UI', sans-serif;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background: linear-gradient(135deg,#667eea,#764ba2);
overflow:hidden;
}

/* Animated background circles */

.circle{
position:absolute;
border-radius:50%;
background:rgba(255,255,255,0.1);
animation: float 10s infinite;
}

.circle:nth-child(1){
width:200px;
height:200px;
top:10%;
left:10%;
}

.circle:nth-child(2){
width:300px;
height:300px;
bottom:10%;
right:15%;
animation-delay:2s;
}

.circle:nth-child(3){
width:150px;
height:150px;
top:70%;
left:20%;
animation-delay:4s;
}

@keyframes float{
0%{transform:translateY(0px);}
50%{transform:translateY(-40px);}
100%{transform:translateY(0px);}
}

/* Glass card */

.container{
background:rgba(255,255,255,0.1);
padding:40px;
border-radius:15px;
backdrop-filter:blur(10px);
text-align:center;
color:white;
width:400px;
box-shadow:0 8px 30px rgba(0,0,0,0.2);
animation:fadeIn 1.5s ease;
}

@keyframes fadeIn{
from{
opacity:0;
transform:translateY(40px);
}
to{
opacity:1;
transform:translateY(0);
}
}

h1{
font-size:32px;
margin-bottom:15px;
}

p{
font-size:16px;
margin-bottom:30px;
opacity:0.9;
}

/* Button */

.btn{
display:inline-block;
padding:12px 30px;
background:#ffffff;
color:#764ba2;
border-radius:30px;
text-decoration:none;
font-weight:bold;
transition:0.3s;
}

.btn:hover{
background:#764ba2;
color:white;
transform:scale(1.1);
box-shadow:0 5px 15px rgba(0,0,0,0.3);
}

.footer{
margin-top:20px;
font-size:13px;
opacity:0.8;
}

</style>

</head>

<body>

<div class="circle"></div>
<div class="circle"></div>
<div class="circle"></div>

<div class="container">

<h1>🎓 Student Results Portal</h1>

<p>
Welcome to the Student Results Application.  
Click below to view your academic results.
</p>

<a href="result.html" class="btn">View Results</a>

<div class="footer">
© 2026 Student Results System
</div>

</div>

</body>
</html>
